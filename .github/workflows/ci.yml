name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend-tests:
    name: Backend API tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm test

  frontend-checks:
    name: Frontend lint, unit tests & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/expense-tracker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/expense-tracker/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build

  e2e:
    name: End-to-end (Playwright)
    # E2E is heavier (full stack + browser); run it on PRs only.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # The e2e config's webServer boots the backend (test-server.js, in-memory
      # Mongo) and the frontend dev server, so install deps for all three.
      - name: Install backend deps
        run: npm ci
        working-directory: backend
      - name: Install frontend deps
        run: npm ci
        working-directory: frontend/expense-tracker
      - name: Install e2e deps
        run: npm ci
        working-directory: e2e
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
        working-directory: e2e
      - name: Run e2e tests
        run: npm test
        working-directory: e2e
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7
